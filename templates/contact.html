<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Contact Us - TravelEase</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Basic reset for margins and padding */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            width: 100%;
            font-family: 'Times New Roman', Times, serif;
            background-image: url("{{ url_for('static', filename='bgb.jpeg') }}");
            color: #333;
        }

        /* Navbar Styling - Matching main page */
        .navbar {
            background-color: #ce65cbcf;
            overflow: hidden;
            position: sticky;
            top: 0;
            width: 100%;
        }

        .navbar a {
            float: right;
            display: block;
            color: white;
            text-align: center;
            padding: 14px 20px;
            text-decoration: none;
            font-size: 17px;
        }

        .navbar a:hover {
            color: black;
        }

        .navbar .active {
            background-color: #222422;
            color: white;
        }

        /* Main container styling */
        .main-container {
            padding: 40px 20px;
            min-height: calc(100vh - 140px); /* Accounting for navbar and footer */
        }

        .page-title {
            text-align: center;
            margin-bottom: 40px;
        }

        /* Contact form styling - matching main page form style */
        .contact-form {
            max-width: 800px;
            margin: 0 auto;
            background-color: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #333;
        }

        .form-control {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
            font-family: 'Times New Roman', Times, serif;
            transition: border-color 0.3s ease;
        }

        .form-control:focus {
            border-color: #ce65cb;
            box-shadow: 0 0 0 0.2rem rgba(206, 101, 203, 0.25);
            outline: none;
        }

        /* Button styling to match main page */
        .btn-primary {
            background-color: #007bff;
            border-color: #007bff;
            padding: 10px 20px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            background-color: #0056b3;
            border-color: #0056b3;
        }

        /* Alert styling */
        .alert {
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 5px;
            opacity: 1;
            transition: opacity 1s ease-out;
        }

        .alert-success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .alert-info {
            background-color: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }

        /* Loading animation container */
        .loading-container {
            text-align: center;
            margin-top: 20px;
        }

        /* Floating share container - matching main page */
        .floating-container {
            position: fixed;
            bottom: 100px;
            right: 20px;
            z-index: 100;
        }

        .floating-button {
            width: 60px;
            height: 60px;
            background-color: #333;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
            cursor: pointer;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
        }

        .floating-button:hover {
            background-color: #ce65cb;
        }

        .element-container {
            position: absolute;
            bottom: 70px;
            right: 0;
            display: none;
            flex-direction: column;
            align-items: center;
        }

        .floating-container:hover .element-container {
            display: flex;
        }

        .float-element {
            width: 50px;
            height: 50px;
            background-color: #333;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 20px;
            margin-bottom: 10px;
            text-decoration: none;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
        }

        .float-element:hover {
            background-color: #ce65cb;
            color: white;
        }

        /* Footer Styling - matching main page */
        footer {
            background-color: #030303;
            color: white;
            padding: 20px 0;
            text-align: center;
            width: 100%;
            position: relative;
            margin-top: auto;
        }

        footer a {
            color: #0ed9ddd6;
            text-decoration: none;
        }

        /* Responsive design */
        @media (max-width: 768px) {
            .contact-form {
                padding: 20px;
                margin: 0 10px;
            }
            
            .navbar a {
                float: none;
                display: block;
                text-align: left;
            }
        }
    </style>
</head>
<body>
    <!-- Navbar Section - matching main page -->
    <div class="navbar">
        <a href="{{ url_for('logout') }}">Logout</a>
        <a href="{{ url_for('about') }}">About</a>
        <a href="{{ url_for('contact') }}" class="active">Contact</a>
        <a href="{{ url_for('index') }}">Home</a>
    </div>

    <!-- Main Content -->
    <main>
        <div class="container main-container">
            <div class="row">
                <div class="col">
                    <h1 class="text-center page-title">TravelEase - Contact Us</h1>
                </div>
            </div>

            <!-- Info Alert -->
            <div class="alert alert-info" role="alert">
                <i class="fas fa-info-circle me-2"></i>
                Have questions about your travel planning? We're here to help! Fill out the form below and we'll get back to you soon.
            </div>

            <!-- Contact Form -->
            <div class="contact-form">
                <div style="display: none;" class="alert alert-success" id="success-alert" role="alert">
                    <i class="fas fa-check-circle me-2"></i>
                    Thank you for contacting us! We will get back to you soon.
                </div>

                <form id="form" class="form-inline">
                    <div class="form-group">
                        <label for="name">
                            <i class="fas fa-user me-2"></i>Name:
                        </label>
                        <input type="text" class="form-control" id="name" name="name" 
                               value="{{ user_name }}" placeholder="Enter your full name" required>
                    </div>

                    <div class="form-group">
                        <label for="email">
                            <i class="fas fa-envelope me-2"></i>Email:
                        </label>
                        <input type="email" class="form-control" id="email" name="email" 
                               value="{{ user_email }}" placeholder="Enter your email address" required>
                    </div>

                    <div class="form-group">
                        <label for="subject">
                            <i class="fas fa-tag me-2"></i>Subject:
                        </label>
                        <select class="form-control" id="subject" name="subject" required>
                            <option value="">Select a subject</option>
                            <option value="general">General Inquiry</option>
                            <option value="booking">Booking Assistance</option>
                            <option value="technical">Technical Support</option>
                            <option value="feedback">Feedback</option>
                            <option value="other">Other</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="message">
                            <i class="fas fa-comment me-2"></i>Message:
                        </label>
                        <textarea class="form-control" id="message" name="message" rows="6" 
                                  placeholder="Tell us how we can help you..." required></textarea>
                    </div>

                    <button type="submit" class="btn btn-primary" id="button">
                        <i class="fas fa-paper-plane me-2"></i>Send Message
                    </button>

                    <!-- Loading container -->
                    <div class="loading-container">
                        <img id="loading" style="display: none;" 
                             src="{{ url_for('static', filename='loading.gif') }}" 
                             alt="Loading..." />
                    </div>
                </form>
            </div>
        </div>
    </main>

    <!-- Share Icon - matching main page -->
    <div class="floating-container">
        <div class="floating-button">
            <i class="fa-solid fa-share-from-square"></i>
        </div>
        <!-- Elements -->
        <div class="element-container">
            <!-- Facebook -->
            <a class="float-element" href="https://www.facebook.com/sharer/sharer.php?u=https%3A//sanjeev02.pythonanywhere.com/" target="_blank">
                <span><i class="fa-brands fa-facebook"></i></span>
            </a>

            <!-- WhatsApp -->
            <a class="float-element" href="https://api.whatsapp.com/send?text=Check%20out%20TravelEase:%20https://sanjeev02.pythonanywhere.com" target="_blank">
                <span><i class="fa-brands fa-whatsapp"></i></span>
            </a>

            <!-- Twitter or X -->
            <a class="float-element" href="https://twitter.com/intent/tweet?text=Check%20out%20TravelEase:%20https://sanjeev02.pythonanywhere.com" target="_blank">
                <span><i class="fa-brands fa-x-twitter"></i></span>
            </a>

            <!-- LinkedIn -->
            <a class="float-element" href="https://www.linkedin.com/shareArticle?mini=true&url=https%3A//sanjeev02.pythonanywhere.com" target="_blank">
                <span><i class="fa-brands fa-linkedin"></i></span>
            </a>

            <!-- Telegram -->
            <a class="float-element" href="https://t.me/share?url=https%3A%2F%2Fsanjeev02.pythonanywhere.com%2F&text=Check%20out%20TravelEase" target="_blank">
                <span><i class="fa-brands fa-telegram"></i></span>
            </a>
        </div>
    </div>

    <!-- Footer - matching main page -->
    <footer class="jumbotron text-center text-white" style="background-color: #030303">
        <div class="text-center p-3" style="background-color: rgba(255, 255, 255, 0)">
            <p>&copy; {{now.year}} Copyright</p>
            <p>Made With 🩷 By <a style="color: #0ed9ddd6; text-decoration: none" href="#">Sneha Chaubey</a></p>
        </div>
    </footer>

    <!-- Bootstrap JS -->
    <script async src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL"
            crossorigin="anonymous"></script>

    <!-- EmailJS Scripts -->
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <script type="text/javascript">
        emailjs.init('Q4o0CcL_AYOkuJ2zO') // Replace with your emailjs public key
    </script>

    <script>
        const btn = document.getElementById('button');
        const alerter = document.getElementById('success-alert');
        const loading = document.getElementById('loading');

        document.getElementById('form')
        .addEventListener('submit', function(event) {
            event.preventDefault();

            // Show loading animation
            loading.style.display = 'block';
            btn.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i>Sending...';
            btn.disabled = true;

            const serviceID = 'service_ci0l6eg'; // Replace with your service_id
            const templateID = 'template_pe7d4zp'; // Replace with your template id

            emailjs.sendForm(serviceID, templateID, this)
                .then(() => {
                    loading.style.display = 'none';
                    alerter.style.display = 'block';
                    btn.innerHTML = '<i class="fas fa-check me-2"></i>Message Sent!';
                    btn.disabled = false;
                    
                    // Reset form
                    setTimeout(() => {
                        this.reset();
                        btn.innerHTML = '<i class="fas fa-paper-plane me-2"></i>Send Message';
                    }, 3000);
                    
                }, (err) => {
                    loading.style.display = 'none';
                    btn.innerHTML = '<i class="fas fa-paper-plane me-2"></i>Send Message';
                    btn.disabled = false;
                    alert('Failed to send message. Please try again.');
                    console.error('EmailJS Error:', err);
                });
        });

        // Auto-hide alerts after 5 seconds - matching main page behavior
        setTimeout(function () {
            const alerts = document.querySelectorAll(".alert");
            
            alerts.forEach(function (alert) {
                if (alert.id !== 'success-alert') { // Don't auto-hide success alert
                    alert.style.opacity = 0;
                }
            });

            setTimeout(function () {
                alerts.forEach(function (alert) {
                    if (alert.id !== 'success-alert') {
                        alert.style.display = "none";
                    }
                });
            }, 1000);
        }, 5000);

        // Auto-hide success alert after showing
        document.getElementById('success-alert').addEventListener('DOMNodeInserted', function() {
            setTimeout(() => {
                this.style.opacity = 0;
                setTimeout(() => {
                    this.style.display = 'none';
                }, 1000);
            }, 5000);
        });
    </script>
</body>
</html>
